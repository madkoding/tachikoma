# =============================================================================
# NEURO-OS Docker Compose Configuration
# =============================================================================
# This file orchestrates all services required for the NEURO-OS AI ecosystem.
# Services include: SurrealDB (Graph + Vector DB), Searxng (Web Search),
# Rust Backend API, User UI, and Admin UI.
# =============================================================================

services:
  # ===========================================================================
  # SurrealDB - Graph Database with Vector Search Capabilities
  # ===========================================================================
  # SurrealDB serves as our primary database for storing "memories" as graph
  # nodes with vector embeddings for semantic search (GraphRAG pattern).
  # ===========================================================================
  surrealdb:
    image: surrealdb/surrealdb:v1.5.6
    container_name: neuro-surrealdb
    restart: unless-stopped
    user: root
    command: start --user ${SURREAL_USER:-root} --pass ${SURREAL_PASS:-neuroos_secret_2024} --log info file:/data/neuro.db
    ports:
      - "8000:8000"
    volumes:
      - surrealdb_data:/data
    networks:
      - neuro-network

  # ===========================================================================
  # Searxng - Privacy-Respecting Metasearch Engine
  # ===========================================================================
  # Provides web search capabilities for the AI agents without tracking.
  # Used by the search_web() agent tool for information retrieval.
  # ===========================================================================
  searxng:
    image: searxng/searxng:latest
    container_name: neuro-searxng
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
      - SEARXNG_SECRET=${SEARXNG_SECRET:-neuroos_searx_secret}
    volumes:
      - ./config/searxng:/etc/searxng:rw
    ports:
      - "8080:8080"
    networks:
      - neuro-network
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  # ===========================================================================
  # Ollama - Local LLM Inference Server
  # ===========================================================================
  # Provides local AI inference capabilities. The ModelManager selects
  # appropriate models (3B, 7B, 14B) based on available VRAM.
  # NOTE: GPU support requires nvidia-container-toolkit. Comment out the
  # deploy section if running on CPU only.
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: neuro-ollama
    restart: unless-stopped
    environment:
      # Keep model loaded indefinitely to avoid 30+ second reload times
      - OLLAMA_KEEP_ALIVE=-1
      # Context length for conversations
      - OLLAMA_CONTEXT_LENGTH=4096
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - neuro-network
    # GPU support (requires nvidia-container-toolkit)
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ===========================================================================
  # Voice Service - Piper TTS API (Rust)
  # ===========================================================================
  # Ultra-fast text-to-speech synthesis using Piper TTS with robotic effects.
  # Runs in Docker because it requires Piper binary and voice models.
  # GPU support for accelerated ONNX inference.
  # ===========================================================================
  voice-service:
    build:
      context: ./neuro-voice
      dockerfile: Dockerfile
    container_name: neuro-voice
    restart: unless-stopped
    environment:
      - RUST_LOG=info,voice_service=debug
      - HOST=0.0.0.0
      - PORT=8100
      - PIPER_BIN=/app/piper/piper
      - MODELS_DIR=/app/models
      - DEFAULT_VOICE=es_MX-claude-high
    ports:
      - "8100:8100"
    networks:
      - neuro-network
    # GPU support (requires nvidia-container-toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================================================
  # Checklists Service - Checklist Management Microservice (Rust)
  # ===========================================================================
  # Independent microservice for managing checklists with its own database
  # namespace in SurrealDB. Accessed via API Gateway in neuro-backend.
  # ===========================================================================
  checklists-service:
    build:
      context: ./neuro-checklists
      dockerfile: Dockerfile
    container_name: neuro-checklists
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - PORT=3001
      - DATABASE_URL=ws://surrealdb:8000
      - DATABASE_USER=${SURREAL_USER:-root}
      - DATABASE_PASS=${SURREAL_PASS:-neuroos_secret_2024}
      - DATABASE_NAMESPACE=neuro
      - DATABASE_NAME=checklists
    ports:
      - "3001:3001"
    networks:
      - neuro-network
    depends_on:
      - surrealdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # Music Service - YouTube Music Streaming Microservice (Rust)
  # ===========================================================================
  # Streaming service for YouTube music with audio processing:
  # - 16-band graphic equalizer
  # - Spectrum analyzer
  # - Audio enhancement (compression, exciter, stereo widening)
  # - Cover art lookup via MusicBrainz
  # Uses yt-dlp for extraction and ffmpeg for transcoding.
  # ===========================================================================
  music-service:
    build:
      context: ./neuro-music
      dockerfile: Dockerfile
    container_name: neuro-music
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - MUSIC_PORT=3002
      - DATABASE_URL=ws://neuro-surrealdb:8000
      - DATABASE_USER=${SURREAL_USER:-root}
      - DATABASE_PASS=${SURREAL_PASS:-neuroos_secret_2024}
      - DATABASE_NAMESPACE=music
      - DATABASE_NAME=music
    ports:
      - "3002:3002"
    networks:
      - neuro-network
    depends_on:
      - surrealdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# =============================================================================
# Networks Configuration
# =============================================================================
networks:
  neuro-network:
    driver: bridge
    name: neuro-os-network

# =============================================================================
# Volumes Configuration
# =============================================================================
volumes:
  surrealdb_data:
    name: neuro-surrealdb-data
  ollama_data:
    name: neuro-ollama-data
