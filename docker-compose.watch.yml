# =============================================================================
# NEURO-OS Docker Compose - Watch Mode (Auto-Rebuild)
# =============================================================================
# Use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.watch.yml watch
#
# ⚡ CADA SERVICIO SE RECONSTRUYE INDEPENDIENTEMENTE
# - Solo el contenedor con cambios se reconstruye
# - Usa Dockerfile.dev con cargo-chef + mold para rebuild rápido (~30s)
# - Los demás servicios continúan corriendo sin interrupción
#
# Requires Docker Compose v2.22.0+ with watch support.
# =============================================================================

services:
  # ===========================================================================
  # Voice Service - Watch for changes
  # ===========================================================================
  neuro-voice:
    develop:
      watch:
        - action: rebuild
          path: ./neuro-voice/src
          target: /app/src
        - action: rebuild
          path: ./neuro-voice/Cargo.toml
          target: /app/Cargo.toml

