# =============================================================================
# NEURO-OS Docker Compose - Development Override
# =============================================================================
# Use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# This override provides:
# - Debug builds (faster compilation, ~30% improvement)
# - Persistent cargo cache (dependencies don't recompile)
# - Source volume mounts for hot-reload potential
# - mold linker for 2-3x faster linking
# =============================================================================

services:
  # ===========================================================================
  # Voice Service - Development Build
  # ===========================================================================
  neuro-voice:
    build:
      context: ./neuro-voice
      dockerfile: Dockerfile.dev
    volumes:
      # Persistent cargo cache - dependencies won't recompile!
      - cargo-cache-voice:/root/.cargo/registry
      - cargo-git-voice:/root/.cargo/git
      - voice-target:/app/target
      # Mount source for potential hot-reload
      - ./neuro-voice/src:/app/src:ro

  # ===========================================================================
  # Checklists Service - Development Build
  # ===========================================================================
  neuro-checklists:
    build:
      context: ./neuro-checklists
      dockerfile: Dockerfile.dev
    volumes:
      - cargo-cache-checklists:/root/.cargo/registry
      - cargo-git-checklists:/root/.cargo/git
      - checklists-target:/app/target
      - ./neuro-checklists/src:/app/src:ro

  # ===========================================================================
  # Music Service - Development Build
  # ===========================================================================
  neuro-music:
    build:
      context: ./neuro-music
      dockerfile: Dockerfile.dev
    volumes:
      - cargo-cache-music:/root/.cargo/registry
      - cargo-git-music:/root/.cargo/git
      - music-target:/app/target
      - music-downloads:/data/downloads
      - ./neuro-music/src:/app/src:ro
    environment:
      - DOWNLOADS_PATH=/data/downloads

  # ===========================================================================
  # Chat Service - Development Build
  # ===========================================================================
  neuro-chat:
    build:
      context: ./neuro-chat
      dockerfile: Dockerfile.dev
    volumes:
      - cargo-cache-chat:/root/.cargo/registry
      - cargo-git-chat:/root/.cargo/git
      - chat-target:/app/target
      - ./neuro-chat/src:/app/src:ro

  # ===========================================================================
  # Memory Service - Development Build
  # ===========================================================================
  neuro-memory:
    build:
      context: ./neuro-memory
      dockerfile: Dockerfile.dev
    volumes:
      - cargo-cache-memory:/root/.cargo/registry
      - cargo-git-memory:/root/.cargo/git
      - memory-target:/app/target
      - ./neuro-memory/src:/app/src:ro

  # ===========================================================================
  # Agent Service - Development Build
  # ===========================================================================
  neuro-agent:
    build:
      context: ./neuro-agent
      dockerfile: Dockerfile.dev
    volumes:
      - cargo-cache-agent:/root/.cargo/registry
      - cargo-git-agent:/root/.cargo/git
      - agent-target:/app/target
      - ./neuro-agent/src:/app/src:ro

  # ===========================================================================
  # Pomodoro Service - Development Build
  # ===========================================================================
  neuro-pomodoro:
    build:
      context: ./neuro-pomodoro
      dockerfile: Dockerfile.dev
    ports:
      - "3010:3010"
    environment:
      - PORT=3010
      - RUST_LOG=info
      - BACKEND_URL=http://host.docker.internal:3000
    volumes:
      - cargo-cache-pomodoro:/root/.cargo/registry
      - cargo-git-pomodoro:/root/.cargo/git
      - pomodoro-target:/app/target
      - ./neuro-pomodoro/src:/app/src:ro

  # ===========================================================================
  # Kanban Service - Development Build
  # ===========================================================================
  neuro-kanban:
    build:
      context: ./neuro-kanban
      dockerfile: Dockerfile.dev
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - RUST_LOG=info
      - BACKEND_URL=http://host.docker.internal:3000
    volumes:
      - cargo-cache-kanban:/root/.cargo/registry
      - cargo-git-kanban:/root/.cargo/git
      - kanban-target:/app/target
      - ./neuro-kanban/src:/app/src:ro

  # ===========================================================================
  # Note Service - Development Build
  # ===========================================================================
  neuro-note:
    build:
      context: ./neuro-note
      dockerfile: Dockerfile.dev
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
      - RUST_LOG=info
      - BACKEND_URL=http://host.docker.internal:3000
    volumes:
      - cargo-cache-note:/root/.cargo/registry
      - cargo-git-note:/root/.cargo/git
      - note-target:/app/target
      - ./neuro-note/src:/app/src:ro

  # ===========================================================================
  # Docs Service - Development Build
  # ===========================================================================
  neuro-docs:
    build:
      context: ./neuro-docs
      dockerfile: Dockerfile.dev
    ports:
      - "3008:3008"
    environment:
      - PORT=3008
      - RUST_LOG=info
      - BACKEND_URL=http://host.docker.internal:3000
    volumes:
      - cargo-cache-docs:/root/.cargo/registry
      - cargo-git-docs:/root/.cargo/git
      - docs-target:/app/target
      - ./neuro-docs/src:/app/src:ro

  # ===========================================================================
  # Calendar Service - Development Build
  # ===========================================================================
  neuro-calendar:
    build:
      context: ./neuro-calendar
      dockerfile: Dockerfile.dev
    ports:
      - "3009:3009"
    environment:
      - PORT=3009
      - RUST_LOG=info
      - BACKEND_URL=http://host.docker.internal:3000
    volumes:
      - cargo-cache-calendar:/root/.cargo/registry
      - cargo-git-calendar:/root/.cargo/git
      - calendar-target:/app/target
      - ./neuro-calendar/src:/app/src:ro

  # ===========================================================================
  # Image Service - Development Build
  # ===========================================================================
  neuro-image:
    build:
      context: ./neuro-image
      dockerfile: Dockerfile.dev
    ports:
      - "3011:3011"
    environment:
      - PORT=3011
      - RUST_LOG=info
      - BACKEND_URL=http://host.docker.internal:3000
    volumes:
      - cargo-cache-image:/root/.cargo/registry
      - cargo-git-image:/root/.cargo/git
      - image-target:/app/target
      - ./neuro-image/src:/app/src:ro

# =============================================================================
# Persistent Volumes for Cargo Cache
# =============================================================================
# These volumes persist between builds, so dependencies only compile once!
# =============================================================================
volumes:
  # Voice service cache
  cargo-cache-voice:
    name: neuro-cargo-cache-voice
  cargo-git-voice:
    name: neuro-cargo-git-voice
  voice-target:
    name: neuro-voice-target

  # Checklists service cache
  cargo-cache-checklists:
    name: neuro-cargo-cache-checklists
  cargo-git-checklists:
    name: neuro-cargo-git-checklists
  checklists-target:
    name: neuro-checklists-target

  # Music service cache
  cargo-cache-music:
    name: neuro-cargo-cache-music
  cargo-git-music:
    name: neuro-cargo-git-music
  music-target:
    name: neuro-music-target
  music-downloads:
    name: neuro-music-downloads

  # Chat service cache
  cargo-cache-chat:
    name: neuro-cargo-cache-chat
  cargo-git-chat:
    name: neuro-cargo-git-chat
  chat-target:
    name: neuro-chat-target

  # Memory service cache
  cargo-cache-memory:
    name: neuro-cargo-cache-memory
  cargo-git-memory:
    name: neuro-cargo-git-memory
  memory-target:
    name: neuro-memory-target

  # Agent service cache
  cargo-cache-agent:
    name: neuro-cargo-cache-agent
  cargo-git-agent:
    name: neuro-cargo-git-agent
  agent-target:
    name: neuro-agent-target

  # Pomodoro service cache
  cargo-cache-pomodoro:
    name: neuro-cargo-cache-pomodoro
  cargo-git-pomodoro:
    name: neuro-cargo-git-pomodoro
  pomodoro-target:
    name: neuro-pomodoro-target

  # Kanban service cache
  cargo-cache-kanban:
    name: neuro-cargo-cache-kanban
  cargo-git-kanban:
    name: neuro-cargo-git-kanban
  kanban-target:
    name: neuro-kanban-target

  # Note service cache
  cargo-cache-note:
    name: neuro-cargo-cache-note
  cargo-git-note:
    name: neuro-cargo-git-note
  note-target:
    name: neuro-note-target

  # Docs service cache
  cargo-cache-docs:
    name: neuro-cargo-cache-docs
  cargo-git-docs:
    name: neuro-cargo-git-docs
  docs-target:
    name: neuro-docs-target

  # Calendar service cache
  cargo-cache-calendar:
    name: neuro-cargo-cache-calendar
  cargo-git-calendar:
    name: neuro-cargo-git-calendar
  calendar-target:
    name: neuro-calendar-target

  # Image service cache
  cargo-cache-image:
    name: neuro-cargo-cache-image
  cargo-git-image:
    name: neuro-cargo-git-image
  image-target:
    name: neuro-image-target
